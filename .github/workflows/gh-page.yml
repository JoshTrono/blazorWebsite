name: Deploy to GitHub Pages

# Trigger the workflow on push to the master branch
on:
  push:
    branches: [ master ]

jobs:
  deploy-to-github-pages:
    # Use ubuntu-latest as the environment for steps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Website

    steps:
    # Checkout the repository code
    - uses: actions/checkout@v2

    # Set up the .NET Core SDK (Ensure the correct version is used here)
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.x.x # Adjust if you are using .NET 10 or another version
      
      # Install ASPNetStatic
    - name: Install ASPNetStatic
      run: dotnet tool restore
      
      # Build your ASP.NET Core app
    - name: Build app
      run: dotnet build Website.csproj -c Release
      
      # Generate static files
    - name: Generate Static Site
      run: dotnet tool run aspnetstatic -p Website.csproj -o ${{ github.workspace }}/dist/Web
      
      # Check generated files
    - name: List Static Files
      run: ls ${{ github.workspace }}/dist/Web

    # Modify the base href in the index.html for GitHub Pages
    #- name: Update base tag in index.html
   #   run: sed -i 's|<base href="/" />|<base href="/joshuatrono/" />|g' dist/Web/wwwroot/index.html

    # Add a .nojekyll file to bypass Jekyll processing on GitHub Pages
    - name: Add .nojekyll file
      run: |
        touch ${{ github.workspace }}/dist/Web/wwwroot/.nojekyll
      
      
    # Deploy the published Blazor app to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@3.7.1
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH: gh-pages
        FOLDER: dist/Web/wwwroot
